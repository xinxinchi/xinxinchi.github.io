# Site Settings
title: "Xinxin Chi"
name: "Xinxin Chi"
description: "Postdoctoral Researcher in Immunology"
url: "https://xinxinchi.github.io"
baseurl: "" # 保持为空

# Author Profile (左侧边栏核心配置)
author:
  name: "Xinxin Chi, Ph.D."
  avatar: "/images/profile.jpg"
  bio: "Postdoctoral Researcher at Harvard Medical School Specializing in Immunology and Molecular Biology."
  location: "Boston, MA"
  employer: "Harvard Medical School"
  email: "chixinxinbio@gmail.com"
  googlescholar: "iHZyIQUAAAAJ"
  linkedin: "xinxin-chi-7286601b2"
  github: "xinxinchi"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - node_modules
  - Gemfile
  - package.json
  - README.md
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Default layout settings
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/